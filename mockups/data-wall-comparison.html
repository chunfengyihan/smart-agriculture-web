<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <style>
      * { box-sizing: border-box; }
      html, body { margin: 0; width: 3200px; height: 960px; overflow: hidden; background: #dfe9e2; font-family: "Microsoft YaHei", sans-serif; }
      main { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; padding: 16px; }
      figure { margin: 0; overflow: hidden; border-radius: 10px; background: #fff; box-shadow: 0 5px 20px rgba(0,0,0,.08); }
      figcaption { height: 28px; padding: 5px 12px; color: #315442; font-size: 14px; font-weight: 700; }
      img { display: block; width: 100%; height: 900px; object-fit: contain; background: #fff; }
    </style>
  </head>
  <body>
    <main>
      <figure><figcaption>参考方案 2</figcaption><img src="data-wall-option-2.png" alt="参考方案" /></figure>
      <figure><figcaption>当前实现</figcaption><img src="data-wall-implementation-final.png" alt="当前实现" /></figure>
    </main>
  </body>
</html>
