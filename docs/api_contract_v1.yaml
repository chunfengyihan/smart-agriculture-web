openapi: 3.0.3
info:
  title: Smart Agriculture Django API Contract Draft
  version: 0.1.0
  description: >
    Stage 1 draft contract for the Django migration. Legacy paths keep their
    current response shape. /api/v1/ paths use code/message/data/request_id.
servers:
  - url: http://127.0.0.1:8000
    description: Local Django development server
paths:
  /api/v1/health/:
    get:
      summary: Health check
      operationId: getV1Health
      responses:
        "200":
          description: Service health
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V1HealthResponse"
  /api/v1/integrations/youren/health:
    get:
      summary: Youren integration health
      operationId: getV1IntegrationsYourenHealth
      responses:
        "200":
          description: Youren integration configuration and sample device check
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/V1Success"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/YourenHealth"
        "503":
          $ref: "#/components/responses/ExternalIntegrationDisabled"
  /api/v1/auth/wechat-login:
    post:
      summary: WeChat miniapp login
      operationId: postV1AuthWechatLogin
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeChatLoginRequest"
      responses:
        "200":
          description: JWT token pair and user profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/V1Success"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthTokenPair"
        "400":
          $ref: "#/components/responses/ValidationError"
        "503":
          $ref: "#/components/responses/ExternalIntegrationDisabled"
  /api/v1/auth/refresh:
    post:
      summary: Refresh access token
      operationId: postV1AuthRefresh
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: New access token
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/V1Success"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/RefreshTokenResponse"
        "401":
          $ref: "#/components/responses/AuthError"
  /api/v1/auth/logout:
    post:
      summary: Logout and blacklist refresh token
      operationId: postV1AuthLogout
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshTokenRequest"
      responses:
        "200":
          description: Logout result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/V1Success"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [logged_out]
                        properties:
                          logged_out:
                            type: boolean
        "401":
          $ref: "#/components/responses/AuthError"
  /api/v1/auth/me:
    get:
      summary: Current authenticated user
      operationId: getV1AuthMe
      responses:
        "200":
          description: Current user profile
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/V1Success"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AuthUser"
        "401":
          $ref: "#/components/responses/AuthError"
  /api/greenhouse/dashboard:
    get:
      summary: Legacy greenhouse dashboard
      description: Legacy compatibility path. Response body is the raw DashboardData object.
      operationId: getLegacyGreenhouseDashboard
      responses:
        "200":
          description: Legacy dashboard payload
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DashboardData"
        "503":
          description: External integration disabled or data source unavailable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LegacyError"
  /api/youren/health:
    get:
      summary: Legacy Youren health check
      description: Legacy compatibility path now served by Django; Node proxy only forwards or probes.
      operationId: getLegacyYourenHealth
      responses:
        "200":
          description: Youren integration configuration and sample device check
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/YourenHealth"
  /api/v1/greenhouse/dashboard:
    get:
      summary: V1 greenhouse dashboard
      operationId: getV1GreenhouseDashboard
      responses:
        "200":
          description: V1 dashboard payload
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/V1Success"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DashboardData"
        "503":
          $ref: "#/components/responses/ExternalIntegrationDisabled"
  /api/v1/greenhouse/readings:
    get:
      summary: Query environment readings
      operationId: getV1GreenhouseReadings
      parameters:
        - in: query
          name: greenhouse
          schema:
            type: string
          description: Greenhouse code.
        - in: query
          name: start
          schema:
            type: string
            format: date-time
        - in: query
          name: end
          schema:
            type: string
            format: date-time
        - in: query
          name: metric_type
          schema:
            type: string
            default: environment
        - in: query
          name: page
          schema:
            type: integer
            minimum: 1
        - in: query
          name: page_size
          schema:
            type: integer
            minimum: 1
            maximum: 100
      responses:
        "200":
          description: Paginated environment readings
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/V1Success"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/EnvironmentReadingPage"
        "400":
          $ref: "#/components/responses/ValidationError"
  /api/v1/weather/greenhouse-advice:
    post:
      summary: V1 greenhouse weather and operation advice
      operationId: postV1WeatherGreenhouseAdvice
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WeatherAdviceRequest"
      responses:
        "200":
          description: Weather payload and optional advice
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/V1Success"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/WeatherAdviceResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "503":
          $ref: "#/components/responses/ExternalIntegrationDisabled"
  /api/v1/ai/crop-diagnosis:
    post:
      summary: V1 crop image diagnosis
      operationId: postV1CropDiagnosis
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CropDiagnosisRequest"
      responses:
        "200":
          description: Diagnosis result
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/V1Success"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/CropDiagnosisResult"
        "400":
          $ref: "#/components/responses/ValidationError"
        "413":
          description: Payload too large
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/V1Error"
        "503":
          $ref: "#/components/responses/ExternalIntegrationDisabled"
  /api/v1/ai/agri-chat:
    post:
      summary: V1 agricultural chat
      operationId: postV1AgriChat
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgriChatRequest"
      responses:
        "200":
          description: Agricultural chat answer
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/V1Success"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/AgriChatResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "503":
          $ref: "#/components/responses/ExternalIntegrationDisabled"
components:
  responses:
    ValidationError:
      description: Request validation failed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/V1ValidationError"
    ExternalIntegrationDisabled:
      description: External integration disabled
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/V1Error"
              - type: object
                properties:
                  code:
                    example: 50020
                  message:
                    example: 外部集成未启用
    AuthError:
      description: Authentication failed or token expired
      content:
        application/json:
          schema:
            allOf:
              - $ref: "#/components/schemas/V1Error"
              - type: object
                properties:
                  code:
                    example: 40100
  schemas:
    V1Success:
      type: object
      required: [code, message, data, request_id]
      properties:
        code:
          type: integer
          example: 0
        message:
          type: string
          example: success
        data:
          type: object
        request_id:
          type: string
          format: uuid
    V1Error:
      type: object
      required: [code, message, data, request_id]
      properties:
        code:
          type: integer
          example: 50000
        message:
          type: string
        data:
          type: object
          nullable: true
        request_id:
          type: string
          format: uuid
    V1ValidationError:
      type: object
      required: [code, message, data, request_id]
      properties:
        code:
          type: integer
          example: 40001
        message:
          type: string
          example: 参数校验失败
        data:
          type: object
          required: [field_errors]
          properties:
            field_errors:
              type: object
              additionalProperties:
                type: array
                items:
                  type: string
        request_id:
          type: string
          format: uuid
    LegacyError:
      type: object
      required: [message]
      properties:
        message:
          type: string
        requiredEnv:
          type: array
          items:
            type: string
    V1HealthResponse:
      allOf:
        - $ref: "#/components/schemas/V1Success"
        - type: object
          properties:
            data:
              type: object
              required: [ok]
              properties:
                ok:
                  type: boolean
                service:
                  type: string
                  example: django-api
    YourenHealth:
      type: object
      required: [ok, configured]
      properties:
        ok:
          type: boolean
        configured:
          type: boolean
        enabled:
          type: boolean
        message:
          type: string
        deviceCountInSample:
          type: integer
        sampleDevices:
          type: array
          items:
            type: object
            properties:
              deviceNo:
                type: string
              deviceName:
                type: string
              projectName:
                type: string
              onlineOffline:
                type: integer
    WeChatLoginRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          maxLength: 512
    RefreshTokenRequest:
      type: object
      required: [refresh]
      properties:
        refresh:
          type: string
    AuthUser:
      type: object
      required: [id, username, nickname, role]
      properties:
        id:
          type: integer
        username:
          type: string
        nickname:
          type: string
        role:
          type: string
          enum: [admin, operator, viewer]
    AuthTokenPair:
      type: object
      required: [access, refresh, token, user]
      properties:
        access:
          type: string
        refresh:
          type: string
        token:
          type: string
          description: Compatibility alias for access.
        user:
          $ref: "#/components/schemas/AuthUser"
    RefreshTokenResponse:
      type: object
      required: [access, token]
      properties:
        access:
          type: string
        token:
          type: string
          description: Compatibility alias for access.
    DashboardData:
      type: object
      required: [generatedAt, source, crops]
      properties:
        generatedAt:
          type: string
          format: date-time
        source:
          type: string
          enum: [mock, local, youren]
        crops:
          type: array
          items:
            $ref: "#/components/schemas/Crop"
    Crop:
      type: object
      required: [id, name, greenhouses]
      properties:
        id:
          type: string
        name:
          type: string
        latinName:
          type: string
        description:
          type: string
        heroImage:
          type: string
        accent:
          type: string
        greenhouses:
          type: array
          items:
            $ref: "#/components/schemas/Greenhouse"
    Greenhouse:
      type: object
      required: [id, name, status, metrics, trend, alerts]
      properties:
        id:
          type: string
        name:
          type: string
        area:
          type: string
        status:
          type: string
          enum: [online, warning, offline]
        onlineDevices:
          type: integer
        totalDevices:
          type: integer
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/MetricReading"
        trend:
          type: array
          items:
            $ref: "#/components/schemas/TrendPoint"
        alerts:
          type: array
          items:
            $ref: "#/components/schemas/AlertItem"
    MetricReading:
      type: object
      required: [key, label, value, unit, status, target]
      properties:
        key:
          type: string
        label:
          type: string
        value:
          type: number
          nullable: true
        unit:
          type: string
        status:
          type: string
          enum: [normal, warning, critical]
        target:
          type: string
    TrendPoint:
      type: object
      required: [time]
      properties:
        time:
          type: string
        airTemp:
          type: number
          nullable: true
        airHumidity:
          type: number
          nullable: true
        soilHumidity:
          type: number
          nullable: true
        light:
          type: number
          nullable: true
    AlertItem:
      type: object
      required: [id, level, message, time]
      properties:
        id:
          type: string
        level:
          type: string
          enum: [warning, critical]
        message:
          type: string
        time:
          type: string
    EnvironmentReadingPage:
      type: object
      required: [count, results]
      properties:
        count:
          type: integer
        next:
          type: string
          nullable: true
        previous:
          type: string
          nullable: true
        results:
          type: array
          items:
            $ref: "#/components/schemas/EnvironmentReading"
    EnvironmentReading:
      type: object
      required: [id, greenhouse, recorded_at, metric_type, source]
      properties:
        id:
          type: integer
        greenhouse:
          type: integer
        recorded_at:
          type: string
          format: date-time
        metric_type:
          type: string
        air_temp:
          type: string
          nullable: true
        air_humidity:
          type: string
          nullable: true
        light:
          type: string
          nullable: true
        co2:
          type: string
          nullable: true
        soil_humidity:
          type: string
          nullable: true
        soil_temp:
          type: string
          nullable: true
        ec:
          type: string
          nullable: true
        ph:
          type: string
          nullable: true
        source:
          type: string
    MetricInput:
      type: object
      properties:
        key:
          type: string
        label:
          type: string
        value:
          type: number
          nullable: true
        unit:
          type: string
        status:
          type: string
        target:
          type: string
    WeatherAdviceRequest:
      type: object
      required: [cropId, cropName, greenhouseId, greenhouseName, latitude, longitude]
      properties:
        cropId:
          type: string
        cropName:
          type: string
        greenhouseId:
          type: string
        greenhouseName:
          type: string
        latitude:
          type: number
        longitude:
          type: number
        address:
          type: string
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/MetricInput"
        includeAdvice:
          type: boolean
          default: true
    WeatherAdviceResponse:
      type: object
      properties:
        cacheKey:
          type: string
        cachedAt:
          type: string
          format: date-time
        weather:
          type: object
        advice:
          type: object
          nullable: true
        adviceError:
          type: string
          nullable: true
    CropDiagnosisRequest:
      type: object
      required: [image, cropId, cropName, greenhouseId]
      properties:
        image:
          type: string
          format: binary
        cropId:
          type: string
        cropName:
          type: string
        greenhouseId:
          type: string
        greenhouseName:
          type: string
        useEnvironmentContext:
          type: boolean
        metrics:
          type: string
          description: JSON encoded MetricInput array for legacy compatibility.
    CropDiagnosisResult:
      type: object
      required: [riskLevel, hasPestOrDisease, suspectedIssues, environmentAssessment, recommendations, disclaimer]
      properties:
        riskLevel:
          type: string
          enum: [low, medium, high, unknown]
        hasPestOrDisease:
          type: boolean
        suspectedIssues:
          type: array
          items:
            type: object
        environmentAssessment:
          type: string
        recommendations:
          type: array
          items:
            type: string
        disclaimer:
          type: string
        evidence:
          type: array
          items:
            type: string
        matchedRules:
          type: array
          items:
            type: string
        confidenceReason:
          type: string
        followUpQuestions:
          type: array
          items:
            type: string
    AgriChatRequest:
      type: object
      required: [cropId, cropName, greenhouseId, greenhouseName, question]
      properties:
        cropId:
          type: string
        cropName:
          type: string
        greenhouseId:
          type: string
        greenhouseName:
          type: string
        question:
          type: string
        metrics:
          type: array
          items:
            $ref: "#/components/schemas/MetricInput"
    AgriChatResponse:
      type: object
      required: [riskLevel, summary, likelyCauses, actions, watchItems, matchedRules, disclaimer]
      properties:
        riskLevel:
          type: string
          enum: [low, medium, high, unknown]
        summary:
          type: string
        likelyCauses:
          type: array
          items:
            type: string
        actions:
          type: array
          items:
            type: string
        watchItems:
          type: array
          items:
            type: string
        matchedRules:
          type: array
          items:
            type: string
        disclaimer:
          type: string
