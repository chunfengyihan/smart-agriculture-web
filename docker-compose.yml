services:
  django:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DJANGO_SETTINGS_MODULE: config.settings.production
      DJANGO_SECRET_KEY: ${DJANGO_SECRET_KEY:-replace-this-with-a-strong-random-production-secret-0123456789-ABCDEFGHIJKLMNOPQRSTUVWXYZ}
      DJANGO_ALLOWED_HOSTS: ${DJANGO_ALLOWED_HOSTS:-api.example.com}
      DJANGO_CORS_ALLOWED_ORIGINS: ${DJANGO_CORS_ALLOWED_ORIGINS:-https://www.example.com}
      DJANGO_CSRF_TRUSTED_ORIGINS: ${DJANGO_CSRF_TRUSTED_ORIGINS:-https://www.example.com,https://api.example.com}
      DJANGO_SECURE_SSL_REDIRECT: ${DJANGO_SECURE_SSL_REDIRECT:-true}
      DJANGO_SESSION_COOKIE_SECURE: ${DJANGO_SESSION_COOKIE_SECURE:-true}
      DJANGO_CSRF_COOKIE_SECURE: ${DJANGO_CSRF_COOKIE_SECURE:-true}
      DJANGO_USE_X_FORWARDED_HOST: ${DJANGO_USE_X_FORWARDED_HOST:-true}
      DJANGO_SECURE_PROXY_SSL_HEADER: ${DJANGO_SECURE_PROXY_SSL_HEADER:-true}
      DJANGO_STATIC_ROOT: /app/staticfiles
      DJANGO_MEDIA_ROOT: /app/media
      DJANGO_FRONTEND_DIST_DIR: /app/dist
      DB_ENGINE: mysql
      MYSQL_DB_NAME: ${MYSQL_DB_NAME:-smart_agri}
      MYSQL_DB_USER: ${MYSQL_DB_USER:-smart_agri}
      MYSQL_DB_PASSWORD: ${MYSQL_DB_PASSWORD:-smart_agri_password}
      MYSQL_DB_HOST: mysql
      MYSQL_DB_PORT: 3306
      DJANGO_CACHE_BACKEND: redis
      REDIS_CACHE_URL: redis://redis:6379/1
      EXTERNAL_INTEGRATIONS_ENABLED: "false"
    command: >
      sh -c "python manage.py collectstatic --noinput
      && python manage.py migrate --noinput
      && gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 60"
    volumes:
      - staticfiles:/app/staticfiles
      - media:/app/media
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_started

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${MYSQL_DB_NAME:-smart_agri}
      MYSQL_USER: ${MYSQL_DB_USER:-smart_agri}
      MYSQL_PASSWORD: ${MYSQL_DB_PASSWORD:-smart_agri_password}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-smart_agri_root_password}
    command: ["mysqld", "--character-set-server=utf8mb4", "--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD} --silent"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis-data:/data

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/smart-agri.conf:/etc/nginx/conf.d/default.conf:ro
      - staticfiles:/var/www/smart-agri/static:ro
      - media:/var/www/smart-agri/media:ro
      - ./deploy/certs:/etc/nginx/certs:ro
    depends_on:
      - django

volumes:
  mysql-data:
  redis-data:
  staticfiles:
  media:
